<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantity Measurement App</title>
    <link
      href="https://imgs.search.brave.com/FtlRuUaf7w5h7UGsbKn1RIfzDbiXIKtF8xsgPMARLe8/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWcu/aWNvbnM4LmNvbS9w/bGFzdGljaW5lLzEy/MDAvdGFwZS1tZWFz/dXJlLmpwZw"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="left-panel">
        <div class="brand-name">Quantity<br />Measurement App</div>
      </div>
      <div class="right-panel">
        <div class="tabs">
          <button class="tab-btn" id="tabLogin" onclick="switchTab('login')">
            Login
          </button>
          <button
            class="tab-btn active"
            id="tabSignup"
            onclick="switchTab('signup')"
          >
            Signup
          </button>
        </div>

        <div class="form-panel" id="panelLogin">
          <div class="field">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Your Email" />
          </div>

          <div class="field">
            <label>Password</label>
            <div class="input-wrap">
              <input
                type="password"
                id="loginPassword"
                placeholder="Password"
              />
            </div>
          </div>

          <p id="loginMessage"></p>
          <button class="btn-primary" onclick="handleLogin()">Login</button>
        </div>

        <div class="form-panel active" id="panelSignup">
          <div class="field">
            <label for="regName">Full Name</label>
            <input
              type="text"
              id="regName"
              placeholder="Your Name"
              autocomplete="name"
            />
          </div>
          <div class="field">
            <label for="regEmail">Email Id</label>
            <input
              type="email"
              id="regEmail"
              placeholder="Your Email"
              autocomplete="email"
            />
          </div>
          <div class="field">
            <label for="regPassword">Password</label>
            <div class="input-wrap">
              <input
                type="password"
                id="regPassword"
                placeholder="Min 8 characters"
                autocomplete="new-password"
              />
              <button
                class="eye-btn"
                type="button"
                onclick="togglePassword('regPassword', this)"
                aria-label="Toggle Password"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>
          <p id="loginMessage" class="error"></p>
          <button class="btn-primary" onclick="handleLogin()">Login</button>
          <div class="divider">or</div>
          <button class="btn-google" onclick="googleLogin()">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path
                fill="#4285F4"
                d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
              />
              <path
                fill="#34A853"
                d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
              />
              <path
                fill="#FBBC05"
                d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
              />
              <path
                fill="#EA4335"
                d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              />
            </svg>
            Continue with Google
          </button>
        </div>
      </div>
    </div>
    <script src="js/auth.js"></script>
  </body>
</html>
