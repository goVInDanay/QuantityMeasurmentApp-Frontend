<!doctype html>
<html>
  <head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <nav>
      <div class="nav-brand">
        <span class="nav-title">Quantity Measurement</span>
      </div>
      <div class="nav-right">
        <div class="user">
          <div class="avatar" id="avatarInitial">?</div>
          <span id="userName">User</span>
        </div>
        <button class="btn-logout" id="authBtn" onclick="handleAuth()">
          Login
        </button>
      </div>
    </nav>

    <div class="page">
      <div class="card calc-card">
        <div class="card-header">
          <div class="card-icon">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </div>
          <span class="card-title">Quantity Calculator</span>
        </div>
        <div class="card-body">
          <select id="measurementType">
            <option value="">-- Select Type --</option>
            <option value="LengthUnit">Length</option>
            <option value="VolumeUnit">Volume</option>
            <option value="WeightUnit">Weight</option>
            <option value="TemperatureUnit">Temperature</option>
          </select>
          <div class="type-grid">
            <button
              class="type-btn"
              data-value="LengthUnit"
              onclick="selectType('LengthUnit')"
            >
              <span class="type-icon">📏</span>
              <span class="type-label">Length</span>
            </button>
            <button
              class="type-btn"
              data-value="VolumeUnit"
              onclick="selectType('VolumeUnit')"
            >
              <span class="type-icon">🧴</span>
              <span class="type-label">Volume</span>
            </button>
            <button
              class="type-btn"
              data-value="WeightUnit"
              onclick="selectType('WeightUnit')"
            >
              <span class="type-icon">⚖️</span>
              <span class="type-label">Weight</span>
            </button>
            <button
              class="type-btn"
              data-value="TemperatureUnit"
              onclick="selectType('TemperatureUnit')"
            >
              <span class="type-icon">🌡️</span>
              <span class="type-label">Temperature</span>
            </button>
          </div>
          <div class="converter">
            <div class="conv-side">
              <span class="conv-label">From</span>
              <div class="input-group">
                <input type="number" id="value1" placeholder="0" />
                <select class="unit-select" id="unit1"></select>
              </div>
            </div>
            <button class="swap-btn" title="Swap units" onclick="swapUnits()">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M7 16V4m0 0L3 8m4-4l4 4" />
                <path d="M17 8v12m0 0l4-4m-4 4l-4-4" />
              </svg>
            </button>
            <div class="conv-side">
              <span class="conv-label">To</span>
              <div class="input-group">
                <input type="number" id="value2" placeholder="-" disabled />
                <select class="unit-select" id="unit2"></select>
              </div>
            </div>
          </div>
          <div
            class="temp-warning"
            id="tempWarningBanner"
            style="display: none"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
              />
              <line x1="12" y1="9" x2="12" y2="13" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
            <span
              >Add, Subtract and Divide are not available for Temperature — only
              Convert is supported.</span
            >
          </div>

          <div class="result-banner" id="resultBanner">
            <span
              id="result"
              style="
                color: var(--ink-muted);
                font-family: &quot;DM Sans&quot;, sans-serif;
                font-size: 0.88rem;
                font-weight: 300;
                font-style: italic;
              "
            >
              Select a type and enter a value to begin
            </span>
          </div>

          <div class="actions">
            <button class="btn-action btn-add" onclick="add()">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Add
            </button>
            <button class="btn-action btn-subtract" onclick="subtract()">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Subtract
            </button>
            <button class="btn-action btn-convert" onclick="convert()">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="1 4 1 10 7 10" />
                <path d="M3.51 15a9 9 0 1 0 .49-3.62" />
              </svg>
              Convert
            </button>
            <!-- ADDED: Divide button -->
            <button class="btn-action btn-divide" onclick="divide()">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <circle
                  cx="12"
                  cy="5"
                  r="1.5"
                  fill="currentColor"
                  stroke="none"
                />
                <circle
                  cx="12"
                  cy="19"
                  r="1.5"
                  fill="currentColor"
                  stroke="none"
                />
              </svg>
              Divide
            </button>
          </div>
        </div>
      </div>
      <div class="card history-card">
        <div class="card-header">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          </div>
          <span class="card-title">History</span>
        </div>
        <div class="card-body">
          <ul class="history-list" id="historyList">
            <li class="empty-history">No history yet</li>
          </ul>
        </div>
      </div>
    </div>
    <script src="js/dashboard.js"></script>
  </body>
</html>
